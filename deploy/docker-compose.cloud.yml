# Officeline 云端部署模板(甲骨文 OCI / 任意 2GB+ 内存 VPS,x86 与 ARM64 均可)
# 推荐用法:在服务器上执行 bootstrap-cloud.sh(自动装 Docker、生成 .env、起服务、打补丁)
# 手动用法:
#   1. cp env.cloud.example .env && 编辑(至少改 DS_PUBLIC 为服务器公网 IP)
#   2. docker compose -f docker-compose.cloud.yml up -d
#   3. DS 就绪后打私网回访补丁(见 bootstrap-cloud.sh 第 5 步,缺它保存文档报错 -4)
# 域名 + HTTPS:.env 里填 APP_DOMAIN/DS_DOMAIN 并设 COMPOSE_PROFILES=https,
#   caddy 服务会自动签发 Let's Encrypt 证书(DS_PUBLIC 同步改成 https://$DS_DOMAIN)
services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    profiles: ["https"]
    ports:
      - "80:80"
      - "443:443"
    environment:
      - APP_DOMAIN=${APP_DOMAIN:-}
      - DS_DOMAIN=${DS_DOMAIN:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config


  ds:
    image: onlyoffice/documentserver:latest   # 多架构镜像,ARM64(甲骨文 Ampere A1)可直接用
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - JWT_ENABLED=true
      - JWT_SECRET=${DS_JWT_SECRET}
    volumes:
      - ds-data:/var/www/onlyoffice/Data
      - ds-log:/var/log/onlyoffice

  app:
    image: node:26-alpine
    restart: unless-stopped
    working_dir: /app
    command: node src/server.js
    ports:
      - "9130:9130"
    volumes:
      - ../server:/app
      - app-data:/app/data
    environment:
      - OFFICELINE_PORT=9130
      # 浏览器访问 DS 的公网地址(IP 部署:http://公网IP:8080;域名部署改 https)
      - OFFICELINE_DS_PUBLIC=${DS_PUBLIC}
      # DS 容器回访 app 用 compose 服务名
      - OFFICELINE_SELF_FOR_DS=http://app:9130
      # 后端取 DS 文件走容器内网(不要走公网回环)
      - OFFICELINE_DS_INTERNAL=http://ds
      # 与 ds 的 JWT_SECRET 一致:编辑器配置签名 + 回调验签
      - OFFICELINE_DS_JWT=${DS_JWT_SECRET}
      # 浏览器可达地址(编辑器自有品牌 logo 需要绝对 URL;域名模式自动生效)
      - OFFICELINE_PUBLIC_URL=${APP_DOMAIN:+https://${APP_DOMAIN}}
      # AI:留空为演示模式;任意 OpenAI 兼容服务(DeepSeek/Gemini/智谱)改 .env 三个变量即可
      - OFFICELINE_AI_KEY=${AI_KEY:-}
      - OFFICELINE_AI_BASE=${AI_BASE:-https://api.deepseek.com}
      - OFFICELINE_AI_MODEL=${AI_MODEL:-deepseek-chat}
      # Apple 内购:App Store Connect 的共享密钥 + 订阅产品 ID(见 docs/mac-app-store.md)
      - OFFICELINE_IAP_SHARED_SECRET=${IAP_SHARED_SECRET:-}
      - OFFICELINE_IAP_BUNDLE_ID=${IAP_BUNDLE_ID:-com.officeline.app}
      - OFFICELINE_IAP_PRODUCTS=${IAP_PRODUCTS:-com.officeline.pro.monthly,com.officeline.pro.yearly}
      # 存储默认 local(落在 app-data 卷)。换 Cloudflare R2/S3 时取消注释并填 .env:
      # - OFFICELINE_STORAGE=s3
      # - OFFICELINE_S3_ENDPOINT=${S3_ENDPOINT}
      # - OFFICELINE_S3_BUCKET=${S3_BUCKET}
      # - OFFICELINE_S3_KEY=${S3_KEY}
      # - OFFICELINE_S3_SECRET=${S3_SECRET}

volumes:
  ds-data:
  ds-log:
  app-data:
  caddy-data:
  caddy-config:
