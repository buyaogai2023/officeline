# Officeline 云端部署模板(甲骨文 OCI / 任意 2GB+ 内存 VPS,x86 与 ARM64 均可)
# 推荐用法:在服务器上执行 bootstrap-cloud.sh(自动装 Docker、生成 .env、起服务、打补丁)
# 手动用法:
#   1. cp env.cloud.example .env && 编辑(至少改 DS_PUBLIC 为服务器公网 IP)
#   2. docker compose -f docker-compose.cloud.yml up -d
#   3. DS 就绪后打私网回访补丁(见 bootstrap-cloud.sh 第 5 步,缺它保存文档报错 -4)
# 域名 + HTTPS:用 Caddy/Nginx 反代 9130 与 8080 两个入口,然后把 DS_PUBLIC 改成 https 地址
services:
  ds:
    image: onlyoffice/documentserver:latest   # 多架构镜像,ARM64(甲骨文 Ampere A1)可直接用
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - JWT_ENABLED=true
      - JWT_SECRET=${DS_JWT_SECRET}
    volumes:
      - ds-data:/var/www/onlyoffice/Data
      - ds-log:/var/log/onlyoffice

  app:
    image: node:26-alpine
    restart: unless-stopped
    working_dir: /app
    command: node src/server.js
    ports:
      - "9130:9130"
    volumes:
      - ../server:/app
      - app-data:/app/data
    environment:
      - OFFICELINE_PORT=9130
      # 浏览器访问 DS 的公网地址(IP 部署:http://公网IP:8080;域名部署改 https)
      - OFFICELINE_DS_PUBLIC=${DS_PUBLIC}
      # DS 容器回访 app 用 compose 服务名
      - OFFICELINE_SELF_FOR_DS=http://app:9130
      # 与 ds 的 JWT_SECRET 一致:编辑器配置签名 + 回调验签
      - OFFICELINE_DS_JWT=${DS_JWT_SECRET}
      # AI:留空为演示模式,填 DeepSeek key 后 docker compose restart app 生效
      - OFFICELINE_AI_KEY=${AI_KEY:-}
      # 存储默认 local(落在 app-data 卷)。换 Cloudflare R2/S3 时取消注释并填 .env:
      # - OFFICELINE_STORAGE=s3
      # - OFFICELINE_S3_ENDPOINT=${S3_ENDPOINT}
      # - OFFICELINE_S3_BUCKET=${S3_BUCKET}
      # - OFFICELINE_S3_KEY=${S3_KEY}
      # - OFFICELINE_S3_SECRET=${S3_SECRET}

volumes:
  ds-data:
  ds-log:
  app-data:
